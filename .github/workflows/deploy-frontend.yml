name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'brigade-medicale-frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'brigade-medicale-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: brigade-medicale-frontend
        run: npm ci

      - name: Build Angular app
        working-directory: brigade-medicale-frontend
        run: npm run build -- --configuration production

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'brigade-medicale-frontend/dist/brigade-medicale'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
