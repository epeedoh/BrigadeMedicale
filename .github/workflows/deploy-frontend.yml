name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'brigade-medicale-frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'brigade-medicale-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: brigade-medicale-frontend
        run: npm ci

      - name: Build Angular app
        working-directory: brigade-medicale-frontend
        run: npm run build -- --configuration production

      - name: Copy build to docs folder
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r brigade-medicale-frontend/dist/brigade-medicale-frontend/* docs/

      - name: Commit and push to main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git commit -m "Deploy: Update frontend build $(date)" || echo "No changes to commit"
          git push origin main
