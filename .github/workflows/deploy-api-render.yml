name: Deploy API to Render

on:
  push:
    branches: [ main ]
    paths:
      - 'src/BrigadeMedicale.API/**'
      - 'src/BrigadeMedicale.Application/**'
      - 'src/BrigadeMedicale.Domain/**'
      - 'src/BrigadeMedicale.Infrastructure/**'
      - '.github/workflows/deploy-api-render.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not configured. Manual deployment needed."
          fi
